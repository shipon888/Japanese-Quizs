<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katakana Quiz | Nihongo Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quiz.css">
</head>
<body>
    <div class="sakura-container" id="sakura-bg"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">🎌</span> Nihongo<span class="accent-text">Master</span>
            </a>
            <div class="nav-menu" id="nav-menu">
    <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Home</a>
    <a href="hiragana.html" class="nav-item"><span class="jp-char">あ</span> Hiragana</a>
    <a href="katakana.html" class="nav-item"><span class="jp-char">ア</span> Katakana</a>
    <a href="vocabulary.html" class="nav-item"><i class="fa-solid fa-book"></i> Vocabulary</a>
    <a href="mock-test.html" class="nav-item"><i class="fa-solid fa-file-signature"></i> Mock Test</a>
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode"><i class="fa-solid fa-moon"></i></button>
</div>
            <div class="nav-toggle" id="nav-toggle"><i class="fa-solid fa-bars"></i></div>
        </div>
    </nav>

    <main class="quiz-main-container">
        <div id="quiz-box" class="quiz-box-card">
            <div class="quiz-header">
                <div class="quiz-info">
                    <span class="info-tag"><i class="fa-solid fa-layer-group"></i> Katakana Basic</span>
                    <span id="question-counter" class="info-tag">Question 1/46</span>
                </div>
                <div class="progress-bar-wrapper">
                    <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
                </div>
            </div>

            <div class="question-display-container">
                <h1 id="character-display">ア</h1>
                <p class="question-prompt">Select the correct pronunciation:</p>
            </div>

            <div id="options-grid" class="options-layout-grid">
                </div>

            <div id="feedback-panel" class="feedback-panel hidden">
                <div class="feedback-message-box">
                    <span id="feedback-icon"></span>
                    <div class="feedback-text-wrapper">
                        <p id="feedback-title"></p>
                        <p id="feedback-explanation"></p>
                    </div>
                </div>
                <button id="next-question-btn" class="btn-next">Next Character <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>

        <div id="scoreboard-box" class="quiz-box-card hidden">
            <div class="scoreboard-header">
                <span class="trophy-badge">🏆</span>
                <h2>Quiz Complete!</h2>
                <p id="score-evaluation-msg">Outstanding Performance!</p>
                <div id="star-rating-container" class="star-rating">⭐⭐⭐⭐⭐</div>
            </div>
            
            <div class="stats-grid-row">
                <div class="stat-item shadow-green">
                    <span class="stat-num text-success" id="stat-correct">0</span>
                    <span class="stat-label">Correct</span>
                </div>
                <div class="stat-item shadow-red">
                    <span class="stat-num text-danger" id="stat-wrong">0</span>
                    <span class="stat-label">Wrong</span>
                </div>
                <div class="stat-item shadow-blue">
                    <span class="stat-num text-info" id="stat-accuracy">0%</span>
                    <span class="stat-label">Accuracy</span>
                </div>
            </div>

            <div class="scoreboard-actions">
                <button id="restart-quiz-btn" class="btn-restart"><i class="fa-solid fa-rotate-left"></i> Try Again</button>
                <a href="index.html" class="btn-home-return"><i class="fa-solid fa-house"></i> Home Screen</a>
            </div>
        </div>
    </main>

    <script>
        const navToggle = document.getElementById('nav-toggle');
        const navMenu = document.getElementById('nav-menu');
        if (navToggle) {
            navToggle.addEventListener('click', () => {
                navMenu.classList.toggle('show');
                navToggle.innerHTML = navMenu.classList.contains('show') ? '<i class="fa-solid fa-xmark"></i>' : '<i class="fa-solid fa-bars"></i>';
            });
        }
        const themeToggle = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeToggle.innerHTML = currentTheme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        
        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.innerHTML = newTheme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        });

        const sakuraBg = document.getElementById('sakura-bg');
        for (let i = 0; i < 20; i++) {
            const petal = document.createElement('div');
            petal.classList.add('sakura-petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 6 + 6) + 's';
            petal.style.animationDelay = Math.random() * 5 + 's';
            petal.style.width = Math.random() * 8 + 8 + 'px';
            petal.style.height = Math.random() * 6 + 6 + 'px';
            sakuraBg.appendChild(petal);
        }
    </script>
    <script src="js/katakana.js"></script>
</body>
</html>
