<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N5 Official Mock Test | Nihongo Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quiz.css">
    <style>
        .exam-context-label { background-color: var(--primary-red); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .exam-question-text { font-family: 'Noto Sans JP', sans-serif; font-size: 1.8rem !important; line-height: 1.6; color: var(--text-main); margin-bottom: 20px; text-align: left !important; }
        .opt-mock-btn { font-size: 1.1rem !important; text-align: left !important; padding: 15px 20px !important; font-family: 'Noto Sans JP', sans-serif; }
        .explanation-card { margin-top: 10px; font-size: 0.95rem; color: var(--text-main); font-weight: 500; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="sakura-container" id="sakura-bg"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><span class="logo-icon">🎌</span> Nihongo_With<span class="accent-text">Shipon</span></a>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Home</a>
                <a href="hiragana.html" class="nav-item"><span class="jp-char">あ</span> Hiragana</a>
                <a href="katakana.html" class="nav-item"><span class="jp-char">ア</span> Katakana</a>
                <a href="vocabulary.html" class="nav-item"><i class="fa-solid fa-book"></i> Vocabulary</a>
                <a href="mock-test.html" class="nav-item active"><i class="fa-solid fa-file-signature"></i> Mock Test</a>
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode"><i class="fa-solid fa-moon"></i></button>
            </div>
            <div class="nav-toggle" id="nav-toggle"><i class="fa-solid fa-bars"></i></div>
        </div>
    </nav>

    <main class="quiz-main-container" style="max-width: 800px;">
        <div id="quiz-box" class="quiz-box-card">
            <div class="quiz-header">
                <div class="quiz-info">
                    <span id="exam-type-badge" class="exam-context-label">NAT-TEST N5 Pattern</span>
                    <span id="question-counter" class="info-tag">Question 1/20</span>
                </div>
                <div class="progress-bar-wrapper">
                    <div id="progress-fill" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="question-display-container" style="margin: 20px 0;">
                <div id="exam-question-field" class="exam-question-text">きのうは 📑**びょういん**へ いきました。</div>
                <p class="question-prompt">Select the correct choice to complete or read the target sentence:</p>
            </div>

            <div id="options-grid" class="options-layout-grid" style="grid-template-columns: 1fr;">
                </div>

            <div id="feedback-panel" class="feedback-panel hidden">
                <div class="feedback-message-box">
                    <span id="feedback-icon"></span>
                    <div class="feedback-text-wrapper">
                        <p id="feedback-title"></p>
                        <div id="feedback-explanation" class="explanation-card"></div>
                    </div>
                </div>
                <button id="next-question-btn" class="btn-next">Next Question <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>

        <div id="scoreboard-box" class="quiz-box-card hidden">
            <div class="scoreboard-header">
                <span class="trophy-badge">🏆</span>
                <h2>Exam Results Overview</h2>
                <p id="score-evaluation-msg">Analysis Complete</p>
                <div id="star-rating-container" class="star-rating">⭐⭐⭐⭐⭐</div>
            </div>
            
            <div class="stats-grid-row">
                <div class="stat-item shadow-green"><span class="stat-num text-success" id="stat-correct">0</span><span class="stat-label">Correct</span></div>
                <div class="stat-item shadow-red"><span class="stat-num text-danger" id="stat-wrong">0</span><span class="stat-label">Wrong</span></div>
                <div class="stat-item shadow-blue"><span class="stat-num text-info" id="stat-accuracy">0%</span><span class="stat-label">Accuracy</span></div>
            </div>

            <div class="scoreboard-actions">
                <button id="restart-quiz-btn" class="btn-restart"><i class="fa-solid fa-rotate-left"></i> Retake Exam</button>
                <a href="index.html" class="btn-home-return"><i class="fa-solid fa-house"></i> Return Home</a>
            </div>
        </div>
    </main>

    <script>
        // Official Real-Exam High Yield Dataset (10 NAT-TEST Format + 10 JLPT N5 Format)
        const mockExamDataset = [
            // --- NAT-TEST N5 PATTERNS (Vocabulary / Kanji Reading) ---
            { type: "NAT-TEST N5 Pattern", q: "きのうは びょういん へ いきました。 What is the reading of びょういん?", answer: "Hospital (হাসপাতাল)", options: ["Hospital (হাসপাতাল)", "Hotel (হোটেল)", "Library (গ্রন্থাগার)", "School (বিদ্যালয়)"], exp: "びょういん (Byouin) means Hospital. Do not confuse it with びよういん (Biyouin - Beauty Salon)." },
            { type: "NAT-TEST N5 Pattern", q: "つくえの **うえ** に 本があります。 What is the correct kanji for うえ?", answer: "上", options: ["上", "下", "中", "前"], exp: "うえ (Up/On) is written as 上. 下 means down, 中 means inside, and 前 means front." },
            { type: "NAT-TEST N5 Pattern", q: "あそこへ **いっしょに** いきましょう。 What does いっしょに mean?", answer: "Together (একত্রে / একসাথে)", options: ["Together (একত্রে / একসাথে)", "Alone (একা)", "Quickly (দ্রুত)", "Slowly (ধীরে ধীরে)"], exp: "いっしょに (Isshoni) explicitly means 'Together' in N5 context conversations." },
            { type: "NAT-TEST N5 Pattern", q: "まいあさ **新聞** を よみます。 What is the reading of 新聞?", answer: "しんぶん", options: ["しんぶん", "ざっし", "ほん", "てちょう"], exp: "新聞 means Newspaper, read as しんぶん (Shinbun)." },
            { type: "NAT-TEST N5 Pattern", q: "でんしゃの中が **あつい** ですね。 What is the meaning of あつい?", answer: "Hot (গরম)", options: ["Hot (গরম)", "Cold (ঠান্ডা)", "Warm (উষ্ণ)", "Cool (ঠান্ডা আমেজ)"], exp: "あつい (Atsui) is the N5 adjective for hot weather/temperature." },
            { type: "NAT-TEST N5 Pattern", q: "このかばんは **いくら** ですか。 What does いくら ask for?", answer: "How much price (দাম কত?)", options: ["How much price (দাম কত?)", "Who (কে?)", "Where (কোথায়?)", "When (কখন?)"], exp: "いくら (Ikura) is used to ask for money costs and prices." },
            { type: "NAT-TEST N5 Pattern", q: "おとうとは 部屋に **います**。 Why is います used?", answer: "For animate objects like brother (প্রাণীবাচক যেমন ভাইয়ের ক্ষেত্রে)", options: ["For animate objects like brother (প্রাণীবাচক যেমন ভাইয়ের ক্ষেত্রে)", "For inanimate items like chairs (জড়বস্তুর ক্ষেত্রে)", "To show past action (অতীত কাল)", "To express a desire (ইচ্ছা প্রকাশ)"], exp: "います (Imasu) is used for living things (people/animals). あります (Arimasu) is used for inanimate things." },
            { type: "NAT-TEST N5 Pattern", q: "李さんは 先生 **ではありません**。 What is the meaning of ではありません?", answer: "Is not / Am not (নয়/নন)", options: ["Is not / Am not (নয়/নন)", "Please do (দয়া করে করুন)", "Is / Am (হয়)", "Want to do (করতে চাই)"], exp: "ではありあせん (Dewa arimasen) is the formal negative form of です (to be)." },
            { type: "NAT-TEST N5 Pattern", q: "日本語の勉強は **おもしろい** です。 What does おもしろい mean?", answer: "Interesting / Fun (মজার / আকর্ষণীয়)", options: ["Interesting / Fun (মজার / আকর্ষণীয়)", "Difficult (কঠিন)", "Boring (বিরক্তিকর)", "Easy (সহজ)"], exp: "おもしろい (Omoshiroi) means interesting, enjoyable, or fun." },
            { type: "NAT-TEST N5 Pattern", q: "会社まで 電車で **１時間** かかります。 What is the reading of １時間?", answer: "いちじかん", options: ["いちじかん", "ひとつじかん", "いちじ", "ついたち"], exp: "時間 counts hours duration. １時間 is read as いちじかん (Ichijikan)." },

            // --- JLPT N5 PATTERNS (Grammar / Particles / Sentence Logic) ---
            { type: "JLPT N5 Pattern", q: "わたしは 毎日 バス [ ? ] 会社へ いきます。 Which particle fills the blank?", answer: "で", options: ["で", "に", "を", "が"], exp: "The particle で (de) indicates the means or tool of transportation (by bus)." },
            { type: "JLPT N5 Pattern", q: "日曜日 に どこ [ ? ] いきませんでした。 Which particle combination completes this negative destination sentence?", answer: "も", options: ["も", "へ", "に", "が"], exp: "どこも + negative verb means 'nowhere'. どこもいきませんでした = Went nowhere." },
            { type: "JLPT N5 Pattern", q: "その本 [ ? ] わたしのではありません。 Which particle introduces the main topic here?", answer: "は", options: ["は", "が", "を", "に"], exp: "The topic marker particle は (wa) points out the subject being discussed." },
            { type: "JLPT N5 Pattern", q: "喫茶店で コーヒー [ ? ] 紅茶を のみます。 Which particle represents choices like 'or'?", answer: "か", options: ["か", "と", "や", "ね"], exp: "The particle か (ka) can mean 'or' when placed between two nouns." },
            { type: "JLPT N5 Pattern", q: "あした テニスを [ ? ]。 (Invitation: Shall we play tennis?)", answer: "しませんか", options: ["しませんか", "しました", "しません", "しましたか"], exp: "～ませんか (~masenka) is the standard N5 structure for making invitations." },
            { type: "JLPT N5 Pattern", q: "部屋に 机 [ ? ] 椅子 など が あります。 Which particle means 'and things like' (incomplete list)?", answer: "や", options: ["や", "と", "に", "は"], exp: "や (ya) links nouns in an incomplete list, often paired with など (nado)." },
            { type: "JLPT N5 Pattern", q: "カメラを かいました。とても [ ? ] です。 (It is very expensive.)", answer: "たかい", options: ["たかい", "たかくない", "たかかった", "たかく"], exp: "とめて (Very) takes a plain positive form adjective here: たかい (Takai)." },
            { type: "JLPT N5 Pattern", q: "マリアさん、その辞書を 貸して [ ? ]。 (Please lend me...)", answer: "ください", options: ["ください", "みます", "います", "あります"], exp: "～てください (~te kudasai) is the standard construction for requests." },
            { type: "JLPT N5 Pattern", q: "昨日、デパートへ いって、買い物を [ ? ]。 (Past chain action completed yesterday)", answer: "しました", options: ["しました", "します", "しに", "して"], exp: "Since the compound sentence starts in the past (いって), the final verb must end in the past tense: しました." },
            { type: "JLPT N5 Pattern", q: "田中さんは 英語 [ ? ] 上手ですね。 Which particle indicates the object of ability/skill?", answer: "が", options: ["が", "を", "に", "で"], exp: "Skills and abilities (上手/下手/わかる/できる) take the object particle が (ga)." }
        ];

        let currentQuestionIndex = 0;
        let scoreCorrect = 0;
        let scoreWrong = 0;
        let hasAnswered = false;

        const quizBox = document.getElementById('quiz-box');
        const scoreboardBox = document.getElementById('scoreboard-box');
        const examBadge = document.getElementById('exam-type-badge');
        const counterLabel = document.getElementById('question-counter');
        const progressFill = document.getElementById('progress-fill');
        const questionField = document.getElementById('exam-question-field');
        const optionsGrid = document.getElementById('options-grid');
        const feedbackPanel = document.getElementById('feedback-panel');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackExp = document.getElementById('feedback-explanation');
        const feedbackIcon = document.getElementById('feedback-icon');
        const nextBtn = document.getElementById('next-question-btn');
        const restartBtn = document.getElementById('restart-quiz-btn');

        document.addEventListener("DOMContentLoaded", initExam);

        function initExam() {
            currentQuestionIndex = 0;
            scoreCorrect = 0;
            scoreWrong = 0;
            scoreboardBox.classList.add('hidden');
            quizBox.classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            hasAnswered = false;
            feedbackPanel.classList.add('hidden');
            optionsGrid.innerHTML = "";
            
            let item = mockExamDataset[currentQuestionIndex];
            examBadge.textContent = item.type;
            counterLabel.textContent = `Question ${currentQuestionIndex + 1}/${mockExamDataset.length}`;
            progressFill.style.width = `${(currentQuestionIndex / mockExamDataset.length) * 100}%`;
            questionField.textContent = item.q;
            
            let choices = [...item.options];
            // Shuffle choices
            for (let i = choices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [choices[i], choices[j]] = [choices[j], choices[i]];
            }

            choices.forEach(text => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn', 'opt-mock-btn');
                btn.textContent = text;
                btn.addEventListener('click', () => verifySelection(btn, text, item));
                optionsGrid.appendChild(btn);
            });
        }

        function verifySelection(btn, text, item) {
            if (hasAnswered) return;
            hasAnswered = true;
            const buttons = optionsGrid.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (text === item.answer) {
                btn.classList.add('correct-state');
                scoreCorrect++;
                feedbackIcon.innerHTML = "🎉";
                feedbackTitle.textContent = "Correct!";
                feedbackTitle.className = "text-success";
            } else {
                btn.classList.add('wrong-state');
                scoreWrong++;
                feedbackIcon.innerHTML = "❌";
                feedbackTitle.textContent = "Incorrect";
                feedbackTitle.className = "text-danger";
                buttons.forEach(b => {
                    if (b.textContent === item.answer) b.classList.add('correct-state');
                });
            }
            feedbackExp.innerHTML = `<strong>Answer Explanations:</strong> ${item.exp}`;
            feedbackPanel.classList.remove('hidden');
        }

        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < mockExamDataset.length) { loadQuestion(); } else { displayFinalScoreboard(); }
        });

        function displayFinalScoreboard() {
            progressFill.style.width = "100%";
            quizBox.classList.add('hidden');
            scoreboardBox.classList.remove('hidden');
            document.getElementById('stat-correct').textContent = scoreCorrect;
            document.getElementById('stat-wrong').textContent = scoreWrong;
            const accuracy = Math.round((scoreCorrect / mockExamDataset.length) * 100);
            document.getElementById('stat-accuracy').textContent = `${accuracy}%`;

            const evalMsg = document.getElementById('score-evaluation-msg');
            if(accuracy >= 80) { evalMsg.textContent = "Pass level secured! Excellent JLPT/NAT performance capability!"; }
            else if(accuracy >= 50) { evalMsg.textContent = "Borderline pass. Review your grammar and particle mistakes to strengthen your core!"; }
            else { evalMsg.textContent = "Needs improvement. Review lessons 1 to 25 carefully and try again!"; }
        }

        restartBtn.addEventListener('click', initExam);

        // Responsive Navigation Control Integration
        const navToggle = document.getElementById('nav-toggle');
        const navMenu = document.getElementById('nav-menu');
        if (navToggle) {
            navToggle.addEventListener('click', () => {
                navMenu.classList.toggle('show');
            });
        }
    </script>
    <script src="js/quiz-data.js"></script>
    <script src="js/mock-test.js"></script>
    
</body>
